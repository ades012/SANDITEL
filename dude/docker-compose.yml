version: "3.8"

services:
  unifi-wa-bot:
    build: .
    container_name: unifi-wa-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOKI_URL: http://loki:3100/loki/api/v1/push
      GROUP_JID: "6281293709447-1562291997@g.us"
      UNIFI_URL: "https://10.11.255.5"
      UNIFI_API_KEY: "gZMqU6awZC7bWQ_9zoXSLtFPbK2HFkJJ"
    volumes:
      - ./core/session:/app/core/session
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./data/loki:/loki

  prom:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
