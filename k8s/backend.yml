# k8s.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: sanditel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: backend-api
        image: ${ECR_BACKEND_URL}:${CI_COMMIT_SHORT_SHA}
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-svc
  namespace: sanditel
spec:
  selector:
    app: backend-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080